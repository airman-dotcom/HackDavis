[build]
  command = "pip install -r requirements.txt"
  publish = "."

[functions]
  # This tells Netlify explicitly to look for Python files in the root
  directory = "."
  included_files = ["*.py"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true