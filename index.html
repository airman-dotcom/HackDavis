<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Acoustic CPR</title>
    <style>
        body { margin: 0; background: #111; color: #00ffcc; font-family: 'Courier New', Courier, monospace; overflow: hidden;}
        #ui { position: absolute; top: 15px; left: 15px; z-index: 10; pointer-events: none; text-shadow: 0 0 5px #00ffcc;}
        #status { font-weight: bold;}
        
        button {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); padding: 20px 40px;
            font-size: 20px; background: #00ffcc; border: none;
            border-radius: 10px; cursor: pointer; font-weight: bold;
            box-shadow: 0 0 30px rgba(0,255,204,0.6);
            z-index: 20;
        }

        canvas {
            display: block; width: 100vw; height: 100vh;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2>2D Sonar</h2>
        <p>Status: <span id="status">Ready</span></p>
        <p>Frequency: 18,000Hz</p>
    </div>

    <button id="startBtn">START SONAR</button>
    <canvas id="sonarCanvas"></canvas>

    <script>
        let audioCtx, analyser, dataArray, source, oscillator;
        let canvas, ctx;
        const TARGET_FREQ = 18000;

        function initCanvas() {
            canvas = document.getElementById('sonarCanvas');
            ctx = canvas.getContext('2d');
            // Make canvas full resolution
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        async function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Disable processing for raw sonar data
            const constraints = {
                audio: {
                    echoCancellation: false,
                    noiseSuppression: false,
                    autoGainControl: false
                }
            };

            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 1024; // Lower FFT is faster for 2D draw
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);

            oscillator = audioCtx.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(TARGET_FREQ, audioCtx.currentTime);
            oscillator.connect(audioCtx.destination);
            oscillator.start();

            document.getElementById('status').innerText = "SONAR ACTIVE";
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            analyser.getByteFrequencyData(dataArray);

            // Find our specific target bin
            const targetBin = Math.floor((TARGET_FREQ / (audioCtx.sampleRate / 2)) * analyser.frequencyBinCount);
            
            // Look at a narrow window around the target
            const windowSize = 20;
            const startBin = targetBin - (windowSize / 2);

            // Calculate the overall movement intensity
            let movementIntensity = 0;
            for(let i=0; i < windowSize; i++) {
                // If there's movement, sound bleeds into bins outside target
                if (Math.abs(i - windowSize/2) > 1) { 
                    movementIntensity += dataArray[startBin + i];
                }
            }
            
            // Normalize intensity to 0-1 range
            let normIntensity = movementIntensity / (windowSize * 150); 
            
            // DRAWING 2D
            drawVisual(normIntensity);
        }

        let history = [];
        const HISTORY_LIMIT = 200;

        function drawVisual(intensity) {
            // Fill background with semi-transparent black for trails
            ctx.fillStyle = 'rgba(17, 17, 17, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Add intensity to our time-series history
            history.push(intensity);
            if (history.length > HISTORY_LIMIT) history.shift();

            // Draw the "Pulse Graph" (intensity over time)
            ctx.beginPath();
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#00ffcc';
            ctx.lineJoin = 'round';

            for (let i = 0; i < history.length; i++) {
                // X maps to time (older data left, newer right)
                let x = (i / HISTORY_LIMIT) * canvas.width;
                // Y maps to intensity (intensity 1 = top, 0 = middle)
                let y = (canvas.height / 2) - (history[i] * (canvas.height / 2));
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();

            // Draw a horizontal baseline
            ctx.beginPath();
            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(0, 255, 204, 0.2)';
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('startBtn').style.display = 'none';
            initCanvas();
            initAudio().catch(err => {
                document.getElementById('status').innerText = "Error: " + err.message;
                console.error(err);
            });
        });

        window.addEventListener('resize', () => {
            if(canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
